<!DOCTYPE html>
<html>
<head>
<title>Doctor Queue</title>

<style>
body {
    font-family: Arial, sans-serif;
    margin: 0;

    /* SAME HOSPITAL BACKGROUND */
    background:
        linear-gradient(rgba(255,255,255,0.75),
                        rgba(255,255,255,0.75)),
        url("hospital.jpg");

    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;

    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Main Card */
.card {
    background: rgba(255,255,255,0.88);
    backdrop-filter: blur(6px);
    padding: 35px;
    border-radius: 15px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    text-align: center;
    width: 420px;
}

h2 { 
    color: #1565c0; 
    margin-bottom: 15px; 
}

input {
    padding: 10px;
    margin-top: 10px;
    width: 80%;
    border-radius: 6px;
    border: 1px solid #ccc;
    outline: none;
}

button {
    padding: 10px 18px;
    margin: 10px 6px 0;
    background: #1565c0;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover { 
    background: #0d47a1; 
    transform: scale(1.05); 
}

.queue   { font-size: 18px; margin-top: 15px; }
.timer   { font-size: 40px; color: #e53935; font-weight: bold; margin-top: 10px; }
.token   { font-size: 20px; color: #074ba3; font-weight: bold; margin-top: 10px; }
.status  { margin-top: 15px; font-weight: bold; font-size: 18px; }

#turnMessage { display: none; margin-top: 20px; }
#turnMessage h2 { color: #2e7d32; }

a.back {
    display: inline-block;
    margin-top: 20px;
    color: #1565c0;
    font-size: 14px;
    text-decoration: none;
}
a.back:hover { text-decoration: underline; }
</style>
</head>

<body>

<div class="card">

    <h2 id="docName"></h2>

    <!-- Step 1 -->
    <div id="appointmentSection">
        <p>Do you have an appointment?</p>
        <button onclick="hasAppointment(true)">Yes</button>
        <button onclick="hasAppointment(false)">No — Join Queue</button>
    </div>

    <!-- Step 2 -->
    <div id="tokenSection" style="display:none;">
        <p>Enter Your Token Number:</p>
        <input type="number" id="tokenInput" placeholder="Enter token number" min="1">
        <br>
        <button onclick="startWithToken()">Submit</button>
    </div>

    <!-- Step 3 -->
    <div id="queueSection" style="display:none;">
        <div class="token"  id="tokenDisplay"></div>
        <div class="queue"  id="patientsDisplay"></div>
        <div class="timer"  id="waitDisplay"></div>
        <div class="status" id="crowdStatus"></div>

        <div id="turnMessage">
            <h2>🔔 It's Your Turn! Please Meet the Doctor.</h2>
            <button onclick="stopAlarm()">OK</button>
        </div>
    </div>

    <a class="back" href="index.html">← Back to Hospital</a>
</div>

<audio id="alarmSound">
    <source src="alarm.mp3" type="audio/mpeg">
</audio>

<script src="data.js"></script>

<script>
// ── Get doctor ─────────────────────────
const params   = new URLSearchParams(window.location.search);
const doctorId = parseInt(params.get("id"));
const doctor   = doctors.find(d => d.id === doctorId);

if (!doctor) {
    document.body.innerHTML =
        "<h2 style='text-align:center;margin-top:40px'>Doctor Not Found</h2>";
    throw new Error("Invalid doctor ID");
}

document.getElementById("docName").innerText =
    doctor.name + " — " + doctor.department;

if (doctor.lastToken === undefined)
    doctor.lastToken = doctor.patientsToday ?? 0;

if (doctor.patientsToday === undefined)
    doctor.patientsToday = 0;

let myToken;
let patientsAhead;
let remainingSeconds;
let timerInterval;

function saveDoctors(){
    localStorage.setItem("doctorsData", JSON.stringify(doctors));
}

// ── Appointment Logic ─────────────────
function hasAppointment(answer) {

    document.getElementById("appointmentSection").style.display="none";

    if(answer){
        document.getElementById("tokenSection").style.display="block";
        return;
    }

    doctor.lastToken += 1;
    myToken = doctor.lastToken;

    patientsAhead = doctor.patientsToday;
    doctor.patientsToday += 1;

    saveDoctors();
    showQueue();
}

function startWithToken(){

    const val=parseInt(document.getElementById("tokenInput").value);

    if(isNaN(val)||val<=0){
        alert("Please enter valid token.");
        return;
    }

    if(val>doctor.lastToken){
        alert("Token not found.");
        return;
    }

    myToken=val;
    patientsAhead=Math.max(0,doctor.lastToken-val);

    document.getElementById("tokenSection").style.display="none";
    showQueue();
}

// ── Queue Timer ─────────────────
function showQueue(){

    document.getElementById("queueSection").style.display="block";
    document.getElementById("tokenDisplay").innerText=
        "Your Token: #"+myToken;

    remainingSeconds=patientsAhead*doctor.avgTime*60;

    renderQueue();
    timerInterval=setInterval(tick,1000);
}

function tick(){
    if(remainingSeconds<=0){
        clearInterval(timerInterval);
        onTurnArrived();
        return;
    }
    remainingSeconds--;
    renderQueue();
}

function renderQueue(){

    const ahead=Math.ceil(
        remainingSeconds/(doctor.avgTime*60)
    );

    document.getElementById("patientsDisplay").innerText=
        "People Ahead: "+ahead;

    const m=Math.floor(remainingSeconds/60)
        .toString().padStart(2,"0");
    const s=(remainingSeconds%60)
        .toString().padStart(2,"0");

    document.getElementById("waitDisplay").innerText=m+":"+s;

    updateCrowdStatus(remainingSeconds);
}

function updateCrowdStatus(secs){

    const el=document.getElementById("crowdStatus");

    if(secs<=1200){
        el.innerText="Status: Low Crowd";
        el.style.color="green";
    }
    else if(secs<=3600){
        el.innerText="Status: Moderate Crowd";
        el.style.color="orange";
    }
    else{
        el.innerText="Status: High Crowd";
        el.style.color="red";
    }
}

// ── Turn Arrived ─────────────────
function onTurnArrived(){

    document.getElementById("waitDisplay").innerText="00:00";
    document.getElementById("patientsDisplay").innerText="People Ahead: 0";

    document.getElementById("crowdStatus").innerText="Status: Low Crowd";
    document.getElementById("crowdStatus").style.color="green";

    document.getElementById("turnMessage").style.display="block";

    if(doctor.patientsToday>0){
        doctor.patientsToday--;
        saveDoctors();
    }

    const alarm=document.getElementById("alarmSound");
    alarm.loop=true;
    alarm.play();
}

function stopAlarm(){
    const alarm=document.getElementById("alarmSound");
    alarm.pause();
    alarm.currentTime=0;
    alarm.loop=false;
    document.getElementById("turnMessage").style.display="none";
}
</script>

</body>
</html>
